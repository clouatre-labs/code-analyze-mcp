name: Build and Attest

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
        description: "Rust target triple (e.g., x86_64-unknown-linux-musl)"
      os:
        required: true
        type: string
        description: "Runner OS (ubuntu-24.04, macos-15)"
      cross:
        required: true
        type: boolean
        description: "Use cross-compilation toolchain"
      version:
        required: true
        type: string
        description: "Release version tag"
      dry_run:
        required: false
        type: boolean
        default: false
        description: "Dry run (skip uploads and signatures)"

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-attest:
    name: Build ${{ inputs.target }}
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ inputs.target }}

      - name: Setup cross-compilation toolchain
        if: ${{ inputs.cross }}
        uses: taiki-e/setup-cross-toolchain-action@20dbac418ca692fd1a9377acf2cec38161169a39 # v1
        with:
          target: ${{ inputs.target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: code-analyze-mcp
          key: ${{ inputs.target }}

      - name: Upload Rust binary
        if: ${{ !inputs.dry_run }}
        id: upload
        uses: taiki-e/upload-rust-binary-action@0e34102c043ded9f2ca39f7af5cd99a540c61aff # v1
        with:
          bin: code-analyze-mcp
          target: ${{ inputs.target }}
          token: ${{ secrets.GITHUB_TOKEN }}
          checksum: sha256
          archive: code-analyze-mcp-${{ inputs.version }}-$target
          ref: refs/tags/v${{ inputs.version }}

      - name: Build binary (dry-run)
        if: ${{ inputs.dry_run }}
        env:
          TARGET: ${{ inputs.target }}
        run: cargo build --release --target "${TARGET}"

      - name: Sign tarball with cosign
        if: ${{ !inputs.dry_run }}
        run: cosign sign-blob --yes --bundle "${{ steps.upload.outputs.tar }}.bundle" "${{ steps.upload.outputs.tar }}"

      - name: Upload bundle to release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh release upload "v${VERSION}" "${{ steps.upload.outputs.tar }}.bundle" --clobber

      - name: Attest build provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: ${{ steps.upload.outputs.tar }}

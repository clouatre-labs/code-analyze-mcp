name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'clippy.toml'
      - '.github/workflows/**'
      - 'tests/**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.filter.outputs.code }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Detect file changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'clippy.toml'
              - '.github/workflows/**'
              - 'tests/**'
            workflows:
              - '.github/workflows/**'

  commitlint:
    name: Lint Commits
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1

  check-base:
    name: Check Branch Base
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Verify branch is rebased on main
        run: |
          git fetch origin main
          base_commit=$(git merge-base origin/main HEAD)
          main_head=$(git rev-parse origin/main)
          if [ "$base_commit" != "$main_head" ]; then
            behind=$(git rev-list --count "$base_commit".."$main_head")
            echo "::error::Branch is $behind commit(s) behind main. Rebase required."
            echo "Run: git fetch origin && git rebase origin/main"
            exit 1
          fi
          echo "Branch is up to date with main."

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check formatting
        run: cargo fmt --check
      - name: Run Clippy lints
        run: cargo clippy --profile ci -- -D warnings -W clippy::cognitive_complexity

  coverage:
    name: Coverage
    runs-on: ubuntu-24.04
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-llvm-cov
      - name: Coverage
        run: |
          cargo llvm-cov --all-features --workspace \
            --ignore-filename-regex 'code-analyze-mcp/src' \
            --lib \
            --test acceptance_tests \
            --test annotations \
            --test fixtures \
            --test idempotency \
            --test integration_tests \
            --test output_size \
            --test semantic_correctness \
            --test test_summary_no_pagination \
            --test test_symbol_focus_summary \
            --lcov --output-path lcov.info
          cargo llvm-cov report --fail-under-lines 80

  deny:
    name: Audit Dependencies
    runs-on: ubuntu-24.04
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install cargo-deny
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-deny
      - name: Check advisories and licenses
        run: cargo deny check advisories licenses

  msrv:
    name: MSRV Check
    runs-on: ubuntu-24.04
    needs: changes
    if: (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') && github.actor != 'renovate[bot]'
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: "1.94.1"
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check MSRV
        run: cargo check

  renovate-check:
    name: Dependency Check (Renovate)
    runs-on: ubuntu-24.04
    needs: changes
    timeout-minutes: 10
    if: github.event.pull_request.user.login == 'renovate[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-deny
        uses: taiki-e/install-action@06203676c62f0d3c765be3f2fcfbebbcb02d09f5 # v2.69.6
        with:
          tool: cargo-deny
      - name: Check advisories and licenses
        run: cargo deny check advisories licenses
      - name: Compile check
        run: cargo check

  zizmor:
    name: zizmor
    runs-on: ubuntu-24.04
    needs: changes
    timeout-minutes: 10
    if: needs.changes.outputs.workflows == 'true' || github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false
          annotations: true
          min-severity: high

  ci-result:
    name: CI Result
    runs-on: ubuntu-24.04
    if: always()
    needs: [changes, commitlint, check-base, lint, coverage, deny, msrv, renovate-check, zizmor]
    steps:
      - name: Verify all jobs passed or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All CI jobs passed or were skipped."

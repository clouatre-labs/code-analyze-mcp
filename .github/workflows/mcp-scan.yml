name: MCP Security Scan

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".github/workflows/mcp-scan.yml"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mcp-scan:
    name: MCP Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      MCP_SCANNER_LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MCP_SCANNER_LLM_MODEL: anthropic/claude-haiku-4-5-20251001
      MCP_SCANNER_LLM_TIMEOUT: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install mcp-scanner
        run: pip install cisco-ai-mcp-scanner==4.3.0

      - name: Build server binary
        run: cargo build

      - name: Run YARA + behavioral scan
        run: |
          mcp-scanner --analyzers yara,behavioral --source-path src/ --format summary stdio --stdio-command ./target/debug/code-analyze-mcp

      - name: Run LLM scan
        if: env.MCP_SCANNER_LLM_API_KEY != ''
        run: |
          mcp-scanner --analyzers llm --format summary stdio --stdio-command ./target/debug/code-analyze-mcp

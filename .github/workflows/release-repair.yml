name: Repair Release

# Rebuilds and re-uploads binary assets for an existing release tag.
# Use this when the main release workflow partially failed (e.g., binaries missing).
# After this workflow completes, run publish-registry-manual.yml separately
# to republish to the MCP registry.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to repair (e.g., 0.1.10)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip uploads and PRs)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DRY_RUN: ${{ inputs.dry_run }}

jobs:
  validate-release:
    name: Validate Release Exists
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check release exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
        run: |
          if ! gh release view "v${VERSION}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "ERROR: Release v${VERSION} does not exist. Create it first."
            exit 1
          fi
          echo "Release v${VERSION} exists."

  build-aarch64-apple-darwin:
    name: Build aarch64-apple-darwin
    needs: validate-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: aarch64-apple-darwin
      os: macos-15
      cross: false
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  build-aarch64-unknown-linux-musl:
    name: Build aarch64-unknown-linux-musl
    needs: validate-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: aarch64-unknown-linux-musl
      os: ubuntu-24.04
      cross: true
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  build-x86_64-unknown-linux-musl:
    name: Build x86_64-unknown-linux-musl
    needs: validate-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: x86_64-unknown-linux-musl
      os: ubuntu-24.04
      cross: true
      version: ${{ inputs.version }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew Formula
    needs: [build-aarch64-apple-darwin, build-aarch64-unknown-linux-musl, build-x86_64-unknown-linux-musl]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: clouatre-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download SHA256 checksums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          RELEASE_TAG="v${VERSION}"
          RELEASE_URL="https://api.github.com/repos/clouatre-labs/aptu-coder/releases/tags/${RELEASE_TAG}"

          # Get release assets
          ASSETS=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$RELEASE_URL" | jq '.assets[] | select(.name | endswith(".tar.gz")) | {name: .name, url: .browser_download_url}')

          # Download each asset and compute SHA256
          echo "$ASSETS" | jq -r '.url' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "/tmp/$filename"
            sha256=$(sha256sum "/tmp/$filename" | cut -d' ' -f1)
            echo "$filename:$sha256" >> /tmp/checksums.txt
          done

      - name: Generate formula
        env:
          VERSION: ${{ inputs.version }}
        run: |
          VERSION_NUMBER="${VERSION}"
          RELEASE_TAG="v${VERSION_NUMBER}"

          declare -A shas
          while IFS=':' read -r filename sha; do
            shas["$filename"]="$sha"
          done < /tmp/checksums.txt

          SHA_MACOS_ARM="${shas["aptu-coder-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz"]}"
          SHA_LINUX_ARM="${shas["aptu-coder-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz"]}"
          SHA_LINUX_X86="${shas["aptu-coder-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz"]}"

          FORMULA="homebrew-tap/Formula/aptu-coder.rb"

          printf '%s\n' \
            'class AptuCoder < Formula' \
            '  desc "MCP server for code structure analysis using tree-sitter"' \
            '  homepage "https://github.com/clouatre-labs/aptu-coder"' \
            '  license "Apache-2.0"' \
            '' \
            '  if OS.mac? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/aptu-coder/releases/download/${RELEASE_TAG}/aptu-coder-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz\"" \
            "    sha256 \"${SHA_MACOS_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/aptu-coder/releases/download/${RELEASE_TAG}/aptu-coder-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.intel?' \
            "    url \"https://github.com/clouatre-labs/aptu-coder/releases/download/${RELEASE_TAG}/aptu-coder-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_X86}\"" \
            '  end' \
            '' \
            '  def install' \
            '    bin.install "aptu-coder"' \
            '  end' \
            '' \
            '  test do' \
            '    assert_match version.to_s, shell_output("#{bin}/aptu-coder --version")' \
            '  end' \
            'end' \
            > "$FORMULA"

      - name: Create feature branch and commit formula update
        env:
          VERSION: ${{ inputs.version }}
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${VERSION}"
          BRANCH_NAME="update-aptu-coder-${RELEASE_TAG}"

          git config user.email "hugues@linux.com"
          git config user.name "Hugues Clouatre"
          git fetch origin
          if git ls-remote --exit-code origin "$BRANCH_NAME" 2>/dev/null; then
            echo "Stale branch $BRANCH_NAME exists, deleting..."
            git push origin --delete "$BRANCH_NAME"
          fi
          git checkout -b "$BRANCH_NAME"
          git rm -f Formula/code-analyze-mcp.rb 2>/dev/null || true
          git add Formula/aptu-coder.rb
          git commit --signoff -m "Update aptu-coder formula for ${RELEASE_TAG}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request with auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${VERSION}"
          BRANCH_NAME="update-aptu-coder-${RELEASE_TAG}"

          gh pr create \
            --title "Update aptu-coder formula for ${RELEASE_TAG}" \
            --body "Automated formula update with SHA256 checksums for release ${RELEASE_TAG}" \
            --head "$BRANCH_NAME" \
            --base main

          # Auto-merge after Audit check passes (ruleset requires status checks)
          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch

  generate-mcpb:
    name: Generate MCPB Bundles
    needs: [build-aarch64-apple-darwin, build-aarch64-unknown-linux-musl, build-x86_64-unknown-linux-musl]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate and upload MCPB bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          RELEASE_TAG="v${VERSION}"

          declare -a targets=("aarch64-apple-darwin" "aarch64-unknown-linux-musl" "x86_64-unknown-linux-musl")

          for target in "${targets[@]}"; do
            echo "Processing target: $target"

            # Download the release artifact
            ARTIFACT_NAME="aptu-coder-${VERSION}-${target}.tar.gz"
            DOWNLOAD_URL="https://github.com/clouatre-labs/aptu-coder/releases/download/${RELEASE_TAG}/${ARTIFACT_NAME}"

            if ! curl -fsSL "$DOWNLOAD_URL" -o "/tmp/${ARTIFACT_NAME}"; then
              echo "Error: Failed to download artifact from ${DOWNLOAD_URL}" >&2
              exit 1
            fi

            # Validate the downloaded tarball before extracting
            if ! tar -tzf "/tmp/${ARTIFACT_NAME}" >/dev/null 2>&1; then
              echo "Error: Downloaded file /tmp/${ARTIFACT_NAME} is not a valid tar.gz archive" >&2
              exit 1
            fi

            # Extract the binary
            mkdir -p "/tmp/mcpb-${target}"
            tar -xzf "/tmp/${ARTIFACT_NAME}" -C "/tmp/mcpb-${target}"

            # Create manifest.json
            printf '%s\n' \
              '{' \
              '  "name": "aptu-coder",' \
              "  \"version\": \"${VERSION}\"," \
              '  "description": "MCP server for code structure analysis using tree-sitter",' \
              '  "args": []' \
              '}' > "/tmp/mcpb-${target}/manifest.json"

            # Create the .mcpb zip file
            MCPB_NAME="aptu-coder-${VERSION}-${target}.mcpb"
            cd "/tmp/mcpb-${target}"
            zip -r "/tmp/${MCPB_NAME}" aptu-coder manifest.json
            cd -

            # Upload to GitHub release
            gh release upload "${RELEASE_TAG}" "/tmp/${MCPB_NAME}" --clobber
          done

  update-server-json:
    name: Update server.json
    needs: [generate-mcpb]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr_branch: ${{ steps.push.outputs.pr_branch }}
    steps:
      - name: Checkout repository at main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download MCPB files and compute SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          RELEASE_TAG="v${VERSION}"

          declare -a targets=("aarch64-apple-darwin" "aarch64-unknown-linux-musl" "x86_64-unknown-linux-musl")
          declare -A shas

          for target in "${targets[@]}"; do
            MCPB_NAME="aptu-coder-${VERSION}-${target}.mcpb"
            DOWNLOAD_URL="https://github.com/clouatre-labs/aptu-coder/releases/download/${RELEASE_TAG}/${MCPB_NAME}"

            curl -fsSL "$DOWNLOAD_URL" -o "/tmp/${MCPB_NAME}"

            sha=$(sha256sum "/tmp/${MCPB_NAME}" | cut -d' ' -f1)
            shas["${target}"]="$sha"
          done

          # Write to environment for next step
          echo "SHA_AARCH64_APPLE_DARWIN=${shas[aarch64-apple-darwin]}" >> "$GITHUB_ENV"
          echo "SHA_AARCH64_LINUX_MUSL=${shas[aarch64-unknown-linux-musl]}" >> "$GITHUB_ENV"
          echo "SHA_X86_64_LINUX_MUSL=${shas[x86_64-unknown-linux-musl]}" >> "$GITHUB_ENV"

      - name: Update server.json with new SHAs and version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          jq \
            --arg version "$VERSION" \
            --arg sha_darwin "$SHA_AARCH64_APPLE_DARWIN" \
            --arg sha_linux_arm "$SHA_AARCH64_LINUX_MUSL" \
            --arg sha_linux_x86 "$SHA_X86_64_LINUX_MUSL" \
            '.packages[0].identifier = "https://github.com/clouatre-labs/aptu-coder/releases/download/v\($version)/aptu-coder-\($version)-aarch64-apple-darwin.mcpb" |
             .packages[0].fileSha256 = $sha_darwin |
             .packages[1].identifier = "https://github.com/clouatre-labs/aptu-coder/releases/download/v\($version)/aptu-coder-\($version)-aarch64-unknown-linux-musl.mcpb" |
             .packages[1].fileSha256 = $sha_linux_arm |
             .packages[2].identifier = "https://github.com/clouatre-labs/aptu-coder/releases/download/v\($version)/aptu-coder-\($version)-x86_64-unknown-linux-musl.mcpb" |
             .packages[2].fileSha256 = $sha_linux_x86' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Create feature branch and commit server.json
        id: push
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          BRANCH_NAME="chore/registry-update-v${VERSION}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Only commit and push if server.json has changed
          if git diff --quiet -- server.json; then
            echo "server.json unchanged; skipping PR creation"
            echo "pr_branch=main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin
          if git ls-remote --exit-code origin "$BRANCH_NAME" 2>/dev/null; then
            echo "Stale branch $BRANCH_NAME exists, deleting..."
            git push origin --delete "$BRANCH_NAME"
          fi

          git checkout -b "$BRANCH_NAME"
          git add server.json
          git commit --signoff -m "chore(registry): update server.json for v${VERSION}"
          git push origin "$BRANCH_NAME"
          echo "pr_branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create pull request with auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          BRANCH_NAME="chore/registry-update-v${VERSION}"

          # Only create PR if server.json was changed
          if [ "${{ steps.push.outputs.pr_branch }}" = "main" ]; then
            echo "server.json unchanged; skipping PR creation"
            exit 0
          fi

          gh pr create \
            --title "chore(registry): update server.json for v${VERSION}" \
            --body "Automated server.json update with MCPB checksums for release v${VERSION}" \
            --head "$BRANCH_NAME" \
            --base main

          # Merge immediately (single-file bot commit, no code to test)
          gh pr merge "$BRANCH_NAME" --squash --delete-branch

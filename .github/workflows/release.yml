name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (skip tag creation, publish, release creation, homebrew)'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DRY_RUN: ${{ inputs.dry_run }}

jobs:
  create-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ inputs.version }}
      tag: v${{ inputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "${{ inputs.version }}" != "$CARGO_VERSION" ]; then
            echo "ERROR: Input version ${{ inputs.version }} does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Create annotated tag
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ inputs.version }}"
          COMMIT_SHA=$(git rev-parse HEAD)

          if gh api repos/${{ github.repository }}/git/refs/tags/"$TAG" --silent 2>/dev/null; then
            echo "Tag $TAG already exists, skipping creation"
          else
            TAG_SHA=$(gh api repos/${{ github.repository }}/git/tags \
              -X POST \
              -f tag="$TAG" \
              -f message="Release $TAG" \
              -f object="$COMMIT_SHA" \
              -f type="commit" \
              --jq '.sha')

            gh api repos/${{ github.repository }}/git/refs \
              -X POST \
              -f ref="refs/tags/$TAG" \
              -f sha="$TAG_SHA"

            echo "Created annotated tag $TAG -> $TAG_SHA"
          fi

      - name: Dry run - skip tag creation
        if: ${{ inputs.dry_run }}
        run: echo "DRY RUN - Would create annotated tag v${{ inputs.version }}"

  create-release:
    name: Create Release
    needs: create-tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ needs.create-tag.outputs.version }}
    steps:
      - name: Checkout repository (real run)
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/tags/v${{ needs.create-tag.outputs.version }}
          fetch-tags: true

      - name: Checkout repository (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Create GitHub release
        if: ${{ !inputs.dry_run }}
        id: create_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.create-tag.outputs.version }}"
          if gh release view "$TAG" --json id --silent 2>/dev/null; then
            echo "Release $TAG already exists, skipping creation"
          else
            gh release create "$TAG" --title "$TAG" --notes "" --draft=false
          fi

      - name: Dry run - skip release creation
        if: ${{ inputs.dry_run }}
        run: echo "DRY RUN - Would create release for v${{ needs.create-tag.outputs.version }}"

  build-and-attest:
    name: Build ${{ matrix.target }}
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      cross: ${{ matrix.cross }}
      version: ${{ needs.create-release.outputs.version }}
      dry_run: ${{ inputs.dry_run }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew Formula
    needs: [create-release, build-and-attest]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: clouatre-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          VERSION_NUMBER="${{ needs.create-release.outputs.version }}"
          RELEASE_URL="https://api.github.com/repos/clouatre-labs/code-analyze-mcp/releases/tags/${RELEASE_TAG}"

          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL" \
            | jq '.assets[] | select(.name | endswith(".tar.gz")) | {name: .name, url: .browser_download_url}')

          echo "$ASSETS" | jq -r '.url' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "/tmp/$filename"
            sha256=$(sha256sum "/tmp/$filename" | cut -d' ' -f1)
            echo "$filename:$sha256" >> /tmp/checksums.txt
          done

      - name: Generate formula
        run: |
          VERSION_NUMBER="${{ needs.create-release.outputs.version }}"
          RELEASE_TAG="v${VERSION_NUMBER}"

          declare -A shas
          while IFS=':' read -r filename sha; do
            shas["$filename"]="$sha"
          done < /tmp/checksums.txt

          SHA_MACOS_ARM="${shas["code-analyze-mcp-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz"]}"
          SHA_LINUX_ARM="${shas["code-analyze-mcp-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz"]}"
          SHA_LINUX_X86="${shas["code-analyze-mcp-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz"]}"

          FORMULA="homebrew-tap/Formula/code-analyze-mcp.rb"

          printf '%s\n' \
            'class CodeAnalyzeMcp < Formula' \
            '  desc "MCP server for code structure analysis using tree-sitter"' \
            '  homepage "https://github.com/clouatre-labs/code-analyze-mcp"' \
            '  license "Apache-2.0"' \
            '' \
            '  if OS.mac? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz\"" \
            "    sha256 \"${SHA_MACOS_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.intel?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_X86}\"" \
            '  end' \
            '' \
            '  def install' \
            '    bin.install "code-analyze-mcp"' \
            '  end' \
            '' \
            '  test do' \
            '    assert_match version.to_s, shell_output("#{bin}/code-analyze-mcp --version")' \
            '  end' \
            'end' \
            > "$FORMULA"

      - name: Create feature branch and commit formula update
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          BRANCH_NAME="update-code-analyze-mcp-${RELEASE_TAG}"

          git config user.email "hugues@linux.com"
          git config user.name "Hugues Clouatre"
          git checkout -b "$BRANCH_NAME"
          git add Formula/code-analyze-mcp.rb
          git commit --signoff -m "Update code-analyze-mcp formula for ${RELEASE_TAG}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request with auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          BRANCH_NAME="update-code-analyze-mcp-${RELEASE_TAG}"

          gh pr create \
            --title "Update code-analyze-mcp formula for ${RELEASE_TAG}" \
            --body "Automated formula update with SHA256 checksums for release ${RELEASE_TAG}" \
            --head "$BRANCH_NAME" \
            --base main

          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch

  publish:
    name: Publish to crates.io
    needs: create-release
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (real run)
        if: ${{ !inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: refs/tags/v${{ needs.create-release.outputs.version }}
          fetch-tags: true

      - name: Checkout repository (dry run)
        if: ${{ inputs.dry_run }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish

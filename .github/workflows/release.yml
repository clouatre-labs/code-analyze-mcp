name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip publish, release creation, homebrew)'
        required: true
        type: boolean
        default: true
      version:
        description: 'Version to simulate (e.g., 0.1.1)'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}

jobs:
  verify-tag-signature:
    name: Verify Tag Signature
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Verify tag is signed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Verifying signature for tag: $TAG"
          
          # Get tag ref to find the tag object SHA
          TAG_SHA=$(gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" --jq '.object.sha')
          TAG_TYPE=$(gh api "repos/${{ github.repository }}/git/refs/tags/$TAG" --jq '.object.type')
          
          if [ "$TAG_TYPE" != "tag" ]; then
            echo "ERROR: $TAG is a lightweight tag (type: $TAG_TYPE), not an annotated/signed tag"
            exit 1
          fi
          
          # Verify the tag signature via GitHub API
          VERIFIED=$(gh api "repos/${{ github.repository }}/git/tags/$TAG_SHA" --jq '.verification.verified')
          REASON=$(gh api "repos/${{ github.repository }}/git/tags/$TAG_SHA" --jq '.verification.reason')
          
          echo "Tag verification: verified=$VERIFIED, reason=$REASON"
          
          if [ "$VERIFIED" != "true" ]; then
            echo "ERROR: Tag $TAG signature is not valid (reason: $REASON)"
            exit 1
          fi
          
          echo "Tag $TAG is signed and verified by GitHub"

  create-release:
    name: Create Release
    needs: [verify-tag-signature]
    if: always() && (needs.verify-tag-signature.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      version: ${{ env.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Extract version from tag or input
        env:
          INPUT_VERSION: ${{ inputs.version }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Validate version matches Cargo.toml
        if: ${{ github.event_name != 'workflow_dispatch' }}
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version $VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Create GitHub release
        if: ${{ env.DRY_RUN != 'true' }}
        uses: taiki-e/create-gh-release-action@c5baa0b5dc700cf06439d87935e130220a6882d9 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false

      - name: Dry run - skip release creation
        if: ${{ env.DRY_RUN == 'true' }}
        run: echo "DRY RUN - Would create release for v$VERSION"

  build-and-attest:
    name: Build ${{ matrix.target }}
    needs: create-release
    permissions:
      contents: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            cross: true
          - target: aarch64-apple-darwin
            os: macos-15
            cross: false
    uses: ./.github/workflows/build-and-attest.yml
    with:
      target: ${{ matrix.target }}
      os: ${{ matrix.os }}
      cross: ${{ matrix.cross }}
      version: ${{ needs.create-release.outputs.version }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    secrets: inherit

  update-homebrew:
    name: Update Homebrew Formula
    needs: [create-release, build-and-attest]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout homebrew-tap repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: clouatre-labs/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Download SHA256 checksums
        run: |
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          RELEASE_URL="https://api.github.com/repos/clouatre-labs/code-analyze-mcp/releases/tags/${RELEASE_TAG}"
          
          # Get release assets
          ASSETS=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "$RELEASE_URL" | jq '.assets[] | select(.name | endswith(".tar.gz")) | {name: .name, url: .browser_download_url}')
          
          # Download each asset and compute SHA256
          echo "$ASSETS" | jq -r '.url' | while read -r url; do
            filename=$(basename "$url")
            curl -sL "$url" -o "/tmp/$filename"
            sha256=$(sha256sum "/tmp/$filename" | cut -d' ' -f1)
            echo "$filename:$sha256" >> /tmp/checksums.txt
          done

      - name: Generate formula
        run: |
          VERSION_NUMBER="${{ needs.create-release.outputs.version }}"
          RELEASE_TAG="v${VERSION_NUMBER}"

          declare -A shas
          while IFS=':' read -r filename sha; do
            shas["$filename"]="$sha"
          done < /tmp/checksums.txt

          SHA_MACOS_ARM="${shas["code-analyze-mcp-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz"]}"
          SHA_LINUX_ARM="${shas["code-analyze-mcp-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz"]}"
          SHA_LINUX_X86="${shas["code-analyze-mcp-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz"]}"

          FORMULA="homebrew-tap/Formula/code-analyze-mcp.rb"

          printf '%s\n' \
            'class CodeAnalyzeMcp < Formula' \
            '  desc "MCP server for code structure analysis using tree-sitter"' \
            '  homepage "https://github.com/clouatre-labs/code-analyze-mcp"' \
            '  license "Apache-2.0"' \
            '' \
            '  if OS.mac? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-aarch64-apple-darwin.tar.gz\"" \
            "    sha256 \"${SHA_MACOS_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.arm?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-aarch64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_ARM}\"" \
            '  elsif OS.linux? && Hardware::CPU.intel?' \
            "    url \"https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/code-analyze-mcp-${VERSION_NUMBER}-x86_64-unknown-linux-musl.tar.gz\"" \
            "    sha256 \"${SHA_LINUX_X86}\"" \
            '  end' \
            '' \
            '  def install' \
            '    bin.install "code-analyze-mcp"' \
            '  end' \
            '' \
            '  test do' \
            '    assert_match version.to_s, shell_output("#{bin}/code-analyze-mcp --version")' \
            '  end' \
            'end' \
            > "$FORMULA"

      - name: Create feature branch and commit formula update
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          BRANCH_NAME="update-code-analyze-mcp-${RELEASE_TAG}"
          
          git config user.email "hugues@linux.com"
          git config user.name "Hugues Clouatre"
          git fetch origin
          if git ls-remote --exit-code origin "$BRANCH_NAME" 2>/dev/null; then
            echo "Stale branch $BRANCH_NAME exists, deleting..."
            git push origin --delete "$BRANCH_NAME"
          fi
          git checkout -b "$BRANCH_NAME"
          git add Formula/code-analyze-mcp.rb
          git commit --signoff -m "Update code-analyze-mcp formula for ${RELEASE_TAG}"
          git push origin "$BRANCH_NAME"

      - name: Create pull request with auto-merge
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd homebrew-tap
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          BRANCH_NAME="update-code-analyze-mcp-${RELEASE_TAG}"
          
          gh pr create \
            --title "Update code-analyze-mcp formula for ${RELEASE_TAG}" \
            --body "Automated formula update with SHA256 checksums for release ${RELEASE_TAG}" \
            --head "$BRANCH_NAME" \
            --base main
          
          # Auto-merge after Audit check passes (ruleset requires status checks)
          gh pr merge "$BRANCH_NAME" --auto --squash --delete-branch

  generate-mcpb:
    name: Generate MCPB Bundles
    needs: [create-release, build-and-attest]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate and upload MCPB bundles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          VERSION="${{ needs.create-release.outputs.version }}"
          
          declare -a targets=("aarch64-apple-darwin" "aarch64-unknown-linux-musl" "x86_64-unknown-linux-musl")
          
          for target in "${targets[@]}"; do
            echo "Processing target: $target"
            
            # Download the release artifact
            ARTIFACT_NAME="code-analyze-mcp-${VERSION}-${target}.tar.gz"
            DOWNLOAD_URL="https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/${ARTIFACT_NAME}"
            
            if ! curl -fsSL "$DOWNLOAD_URL" -o "/tmp/${ARTIFACT_NAME}"; then
              echo "Error: Failed to download artifact from ${DOWNLOAD_URL}" >&2
              exit 1
            fi

            # Validate the downloaded tarball before extracting
            if ! tar -tzf "/tmp/${ARTIFACT_NAME}" >/dev/null 2>&1; then
              echo "Error: Downloaded file /tmp/${ARTIFACT_NAME} is not a valid tar.gz archive" >&2
              exit 1
            fi

            # Extract the binary
            mkdir -p "/tmp/mcpb-${target}"
            tar -xzf "/tmp/${ARTIFACT_NAME}" -C "/tmp/mcpb-${target}"
            
            # Create manifest.json
            printf '%s\n' \
              '{' \
              '  "name": "code-analyze-mcp",' \
              "  \"version\": \"${VERSION}\"," \
              '  "description": "MCP server for code structure analysis using tree-sitter",' \
              '  "args": []' \
              '}' > "/tmp/mcpb-${target}/manifest.json"
            
            # Create the .mcpb zip file
            MCPB_NAME="code-analyze-mcp-${VERSION}-${target}.mcpb"
            cd "/tmp/mcpb-${target}"
            zip -r "/tmp/${MCPB_NAME}" code-analyze-mcp manifest.json
            cd -
            
            # Upload to GitHub release
            gh release upload "${RELEASE_TAG}" "/tmp/${MCPB_NAME}" --clobber
          done

  update-server-json:
    name: Update server.json
    needs: [create-release, generate-mcpb]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository at main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download MCPB files and compute SHA256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          
          RELEASE_TAG="v${{ needs.create-release.outputs.version }}"
          VERSION="${{ needs.create-release.outputs.version }}"
          
          declare -a targets=("aarch64-apple-darwin" "aarch64-unknown-linux-musl" "x86_64-unknown-linux-musl")
          declare -A shas
          
          for target in "${targets[@]}"; do
            MCPB_NAME="code-analyze-mcp-${VERSION}-${target}.mcpb"
            DOWNLOAD_URL="https://github.com/clouatre-labs/code-analyze-mcp/releases/download/${RELEASE_TAG}/${MCPB_NAME}"
            
            curl -fsSL "$DOWNLOAD_URL" -o "/tmp/${MCPB_NAME}"
            
            sha=$(sha256sum "/tmp/${MCPB_NAME}" | cut -d' ' -f1)
            shas["${target}"]="$sha"
          done
          
          # Write to environment for next step
          echo "SHA_AARCH64_APPLE_DARWIN=${shas[aarch64-apple-darwin]}" >> "$GITHUB_ENV"
          echo "SHA_AARCH64_LINUX_MUSL=${shas[aarch64-unknown-linux-musl]}" >> "$GITHUB_ENV"
          echo "SHA_X86_64_LINUX_MUSL=${shas[x86_64-unknown-linux-musl]}" >> "$GITHUB_ENV"

      - name: Update server.json with new SHAs and version
        run: |
          set -euo pipefail
          
          VERSION="${{ needs.create-release.outputs.version }}"
          
          jq \
            --arg version "$VERSION" \
            --arg sha_darwin "${{ env.SHA_AARCH64_APPLE_DARWIN }}" \
            --arg sha_linux_arm "${{ env.SHA_AARCH64_LINUX_MUSL }}" \
            --arg sha_linux_x86 "${{ env.SHA_X86_64_LINUX_MUSL }}" \
            '.packages[0].identifier = "https://github.com/clouatre-labs/code-analyze-mcp/releases/download/v\($version)/code-analyze-mcp-\($version)-aarch64-apple-darwin.mcpb" |
             .packages[0].fileSha256 = $sha_darwin |
             .packages[1].identifier = "https://github.com/clouatre-labs/code-analyze-mcp/releases/download/v\($version)/code-analyze-mcp-\($version)-aarch64-unknown-linux-musl.mcpb" |
             .packages[1].fileSha256 = $sha_linux_arm |
             .packages[2].identifier = "https://github.com/clouatre-labs/code-analyze-mcp/releases/download/v\($version)/code-analyze-mcp-\($version)-x86_64-unknown-linux-musl.mcpb" |
             .packages[2].fileSha256 = $sha_linux_x86' \
            server.json > server.json.tmp && mv server.json.tmp server.json

      - name: Commit and push server.json
        run: |
          set -euo pipefail

          VERSION="${{ needs.create-release.outputs.version }}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          # Only commit and push if server.json has changed
          if git diff --quiet -- server.json; then
            echo "server.json unchanged; skipping commit and push"
            exit 0
          fi

          git add server.json
          git commit --signoff -m "chore(registry): update server.json for v${VERSION}"
          git push origin main

  publish-registry:
    name: Publish to MCP Registry
    needs: [create-release, update-server-json]
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository at main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/v1.5.0/mcp-publisher_linux_amd64.tar.gz" \
            -o /tmp/mcp-publisher.tar.gz
          echo "79bbb73ba048c5906034f73ef6286d7763bd53cf368ea0b358fc593ed360cbd5  /tmp/mcp-publisher.tar.gz" | sha256sum --check
          tar -xzf /tmp/mcp-publisher.tar.gz -C /tmp mcp-publisher
          test -f /tmp/mcp-publisher || { echo "mcp-publisher binary not found in tarball"; exit 1; }
          sudo mv /tmp/mcp-publisher /usr/local/bin/mcp-publisher
          rm -f /tmp/mcp-publisher.tar.gz

      - name: Validate server.json
        run: mcp-publisher validate

      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish

  publish:
    name: Publish to crates.io
    needs: create-release
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Publish to crates.io
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          if curl -sf -A "code-analyze-mcp-release/1.0" "https://crates.io/api/v1/crates/code-analyze-mcp/${VERSION}" > /dev/null; then
            echo "code-analyze-mcp ${VERSION} already published to crates.io, skipping"
            exit 0
          fi
          cargo publish
